name: CTFPilot CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: Tests y calidad de código ──
  test:
    name: Tests & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools hatchling
          pip install -r requirements.txt
          pip install pytest bandit safety

     -  name: Install CTFPilot
        run: |
          pip install hatchling
          python -m hatchling build -t wheel
          pip install dist/*.whl

      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  # ── JOB 2: Seguridad del código (SAST) ──
  sast:
    name: SAST - Static Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r ctfpilot/ -f json -o bandit-report.json || true
          bandit -r ctfpilot/ -ll

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── JOB 3: Dependencias vulnerables ──
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --json || true
          safety check

  # ── JOB 4: Build y scan de imagen Docker ──
  docker:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [sast, dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ctfpilot:${{ github.sha }} .

      - name: Install Trivy
        run: |
          wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan on Docker image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --format table ctfpilot:${{ github.sha }}

      - name: Upload Trivy report
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --format json --output trivy-report.json \
            ctfpilot:${{ github.sha }}

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json