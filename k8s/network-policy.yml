apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ctfpilot-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: ctfpilot
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 53
          protocol: UDP