apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ctfpilot-db-pvc
  namespace: default
  labels:
    app: ctfpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ctfpilot-reports-pvc
  namespace: default
  labels:
    app: ctfpilot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi